<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Local Server 功能测试页面</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🎨 Prism Local Server 功能测试</h1>
        
        <section class="test-section">
            <h2>✅ 测试项目</h2>
            <ul>
                <li>相对路径 CSS 加载测试</li>
                <li>相对路径 JavaScript 加载测试</li>
                <li>相对路径图片加载测试</li>
                <li>中文文件名资源加载测试</li>
                <li>视频 Range Request 测试</li>
            </ul>
        </section>

        <section class="test-section">
            <h2>🖼️ 图片加载测试</h2>
            <div class="image-grid">
                <img src="images/test-image.png" alt="测试图片" class="test-image">
                <img src="images/中文文件名图片.png" alt="中文文件名" class="test-image">
            </div>
        </section>

        <section class="test-section">
            <h2>🎬 视频 Range Request 测试</h2>
            <p>请拖拽视频进度条，测试 Range Request 功能：</p>
            <video controls class="test-video">
                <source src="videos/test-video.mp4" type="video/mp4">
                您的浏览器不支持视频标签。
            </video>
        </section>

        <section class="test-section">
            <h2>📊 JavaScript 功能测试</h2>
            <button id="testButton" class="test-button">点击测试 JavaScript</button>
            <div id="testResult" class="test-result"></div>
        </section>

        <section class="test-section">
            <h2>🌐 网络信息</h2>
            <div id="networkInfo" class="network-info">
                <p><strong>当前访问地址：</strong><span id="currentUrl"></span></p>
                <p><strong>用户代理：</strong><span id="userAgent"></span></p>
            </div>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
