<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Local Server - 测试页面</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🎉 Prism Local Server 测试页面</h1>
        <p>如果你能看到这个页面，说明服务器运行正常！</p>
        
        <div class="card">
            <h2>功能测试</h2>
            <ul>
                <li>✅ HTML文件加载</li>
                <li id="css-test">⏳ CSS样式加载</li>
                <li id="js-test">⏳ JavaScript加载</li>
                <li>✅ 图片加载: <img src="images/test.png" alt="测试图片" style="width: 50px; vertical-align: middle;"></li>
            </ul>
        </div>
        
        <div class="card">
            <h2>服务器信息</h2>
            <p>当前时间: <span id="time"></span></p>
            <p>页面加载时间: <span id="load-time"></span></p>
        </div>
    </div>
    
    <script src="js/script.js"></script>
</body>
</html>
