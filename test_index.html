<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism Local Server - 测试页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 32px;
        }
        
        .status {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 16px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .status h2 {
            color: #2e7d32;
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .info {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            margin: 16px 0;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .label {
            font-weight: 600;
            color: #666;
        }
        
        .value {
            color: #333;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }
        
        .success-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Prism Local Server</h1>
        <p>棱镜本地服务器正在运行</p>
        
        <div class="status">
            <h2>🎉 服务状态：运行中</h2>
            <p>HTTP服务已成功启动，资源加载正常！</p>
        </div>
        
        <div class="info">
            <div class="info-item">
                <span class="label">服务器版本</span>
                <span class="value">v0.1.0</span>
            </div>
            <div class="info-item">
                <span class="label">启动时间</span>
                <span class="value" id="startTime">-</span>
            </div>
            <div class="info-item">
                <span class="label">运行时长</span>
                <span class="value" id="uptime">-</span>
            </div>
            <div class="info-item">
                <span class="label">访问地址</span>
                <span class="value" id="url">-</span>
            </div>
        </div>
        
        <div class="footer">
            <p>Prism Local Server © 2026 Kkwans</p>
            <p>快速部署HTML静态文件到本地HTTP服务器</p>
        </div>
    </div>
    
    <script>
        // 显示当前时间
        document.getElementById('startTime').textContent = new Date().toLocaleString('zh-CN');
        
        // 显示当前URL
        document.getElementById('url').textContent = window.location.href;
        
        // 更新运行时长
        let startTime = Date.now();
        function updateUptime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const seconds = elapsed % 60;
            document.getElementById('uptime').textContent = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        setInterval(updateUptime, 1000);
        updateUptime();
    </script>
</body>
</html>
